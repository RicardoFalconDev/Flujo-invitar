<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Posicionar firmas | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/header.css" />
  <link rel="stylesheet" href="assets/css/buttons.css" />

  <style>
    body, .page { background: #1a1a2e; overflow: hidden; }

    .content-area {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
    }

    /* ── Barra de firmantes ── */
    .signers-bar {
      background: #fff;
      border-bottom: 1px solid var(--border-hdr);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .signers-bar::-webkit-scrollbar { display: none; }

    .bar-label {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
      flex-shrink: 0;
      margin-right: 4px;
    }

    .signer-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px 6px 8px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, background .15s;
      flex-shrink: 0;
    }
    .signer-chip.active  { border-color: var(--blue); background: #f0f2ff; }
    .signer-chip.placed  { border-color: #22c55e; background: #f0fdf4; }

    .chip-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px; color: #fff; flex-shrink: 0;
    }
    .signer-chip.placed .chip-num { background: #16a34a; }

    .chip-email {
      font-size: 12px; font-weight: 500; color: var(--text-main);
      max-width: 140px; overflow: hidden; text-overflow: ellipsis;
    }

    .chip-check { font-size: 14px; color: #16a34a; display: none; }
    .signer-chip.placed .chip-check { display: block; }

    /* ── Área del documento ── */
    .doc-area {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 16px;
    }

    /* Wrapper que escala todo junto (iframe + overlay) */
    .doc-scaler {
      transform-origin: center center;
      transition: transform .2s;
      flex-shrink: 0;
    }

    /* Tarjeta del documento */
    .doc-card {
      width: 320px;
      height: 452px;
      background: #fff;
      border: 0.5px solid #dee2e6;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.45);
    }

    /* iframe ocupa todo el card */
    #pdf-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* Fallback cuando no hay PDF */
    .doc-mock {
      position: absolute;
      inset: 0;
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .doc-mock-line { height: 8px; border-radius: 2px; background: #e8e9f0; }
    .doc-mock-line.title  { height: 14px; width: 60%; background: #d0d2df; }
    .doc-mock-line.short  { width: 45%; }
    .doc-mock-line.medium { width: 75%; }
    .doc-mock-line.long   { width: 92%; }
    .doc-mock-block { margin-top: 6px; display: flex; flex-direction: column; gap: 6px; }

    /* Overlay transparente — recibe los drops */
    .sig-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Zonas de firma ── */
    .stamp-zone {
      position: absolute;
      border: 2px dashed var(--blue);
      border-radius: 3px;
      background: rgba(42,57,208,.10);
      cursor: move;
      touch-action: none;
      min-width: 90px;
      min-height: 50px;
      pointer-events: all;
    }
    .stamp-zone.inactive-zone {
      border-color: #22c55e;
      background: rgba(34,197,94,.09);
      cursor: default;
      pointer-events: none;
    }

    .zone-label {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 6px;
      background: var(--blue);
      border-radius: 2px 2px 0 0;
      flex-shrink: 0;
    }
    .stamp-zone.inactive-zone .zone-label { background: #16a34a; }

    .zone-num {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .zone-email {
      font-size: 9px; color: rgba(255,255,255,.9);
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }

    /* Handles resize */
    .handle {
      position: absolute;
      width: 10px; height: 10px;
      background: #fff;
      border: 2px solid var(--blue);
      border-radius: 2px;
      z-index: 5;
      pointer-events: all;
    }
    .stamp-zone.inactive-zone .handle { border-color: #16a34a; }
    .handle.tl { top: -5px; left: -5px;   cursor: nwse-resize; }
    .handle.tr { top: -5px; right: -5px;  cursor: nesw-resize; }
    .handle.bl { bottom: -5px; left: -5px; cursor: nesw-resize; }
    .handle.br { bottom: -5px; right: -5px; cursor: nwse-resize; }

    /* ── Controls pill (zoom) ── */
    .controls-pill {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(255,255,255,.95);
      border-radius: 999px;
      padding: 6px 10px;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      z-index: 30;
    }
    .ctrl-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border); background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .ctrl-btn:hover { background: var(--bg-sidebar); }
    .ctrl-btn .icon { font-size: 16px; color: var(--text-main); }
    .ctrl-label { font-size: 12px; font-weight: 600; color: var(--text-main); min-width: 36px; text-align: center; }

    /* ── Tip inferior ── */
    .instruction-tip {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(26,26,46,.85);
      backdrop-filter: blur(4px);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap;
      z-index: 30;
      transition: opacity .3s;
    }
    .instruction-tip.hidden { opacity: 0; pointer-events: none; }
    .instruction-tip .icon { color: #fff; font-size: 18px; }
    .instruction-tip p { font-size: 12px; color: rgba(255,255,255,.9); margin: 0; }

    /* ── Coachmark ── */
    .coachmark {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; cursor: pointer;
    }
    .coachmark.hidden { display: none; }
    .coach-card {
      background: #fff; border-radius: 12px; padding: 20px;
      max-width: 280px; display: flex; flex-direction: column; gap: 12px;
      cursor: default;
    }
    .coach-title { font-weight: 700; font-size: 16px; color: var(--text-dark); }
    .coach-body  { font-size: 14px; line-height: 20px; color: var(--text-sub); }
    .coach-footer { display: flex; justify-content: flex-end; }
    .btn-coach {
      height: 36px; padding: 0 20px; background: var(--blue); border-radius: 20px;
      font-family: 'Open Sans', sans-serif; font-size: 14px; font-weight: 600; color: #fff;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-coach:hover { opacity: .9; }

    /* ── Bottom bar ── */
    .bottom-bar {
      background: #fff;
      border-top: 1px solid var(--border-hdr);
      padding: 12px 16px;
      display: flex; gap: 10px; flex-shrink: 0;
    }
    .bottom-bar button { flex: 1; }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header" style="background:#fff">
    <img class="header-logo" src="assets/icons/logo-fid.svg" alt="FID by Lakaut" />
    <span class="header-title">Ubicar firmas</span>
    <button class="icon-btn" aria-label="Cerrar" onclick="window.history.back()">
      <span class="icon">close</span>
    </button>
  </header>

  <!-- BARRA DE FIRMANTES -->
  <div class="signers-bar" id="signers-bar">
    <span class="bar-label">Firmante:</span>
  </div>

  <!-- ÁREA PRINCIPAL -->
  <main class="content-area">
    <div class="doc-area" id="doc-area">

      <!-- Zoom -->
      <div class="controls-pill">
        <button class="ctrl-btn" onclick="zoomOut()"><span class="icon">remove</span></button>
        <span class="ctrl-label" id="zoom-label">100%</span>
        <button class="ctrl-btn" onclick="zoomIn()"><span class="icon">add</span></button>
      </div>

      <!-- Scaler: escala iframe + overlay juntos -->
      <div class="doc-scaler" id="doc-scaler">
        <div class="doc-card" id="doc-card">

          <!-- iframe del PDF (se oculta si no hay blob URL) -->
          <iframe id="pdf-frame" src="" title="Previsualización del documento"></iframe>

          <!-- Fallback mock (se muestra si no hay PDF cargado) -->
          <div class="doc-mock" id="doc-mock" style="display:none">
            <div class="doc-mock-line title"></div>
            <div class="doc-mock-block">
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line medium"></div>
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line short"></div>
            </div>
            <div class="doc-mock-block">
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line medium"></div>
            </div>
            <div class="doc-mock-block">
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line short"></div>
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line medium"></div>
            </div>
            <div class="doc-mock-block">
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line long"></div>
              <div class="doc-mock-line short"></div>
            </div>
          </div>

          <!-- Overlay con las zonas de firma -->
          <div class="sig-overlay" id="sig-overlay"></div>

        </div>
      </div>

      <!-- Tip inferior -->
      <div class="instruction-tip" id="instruction-tip">
        <span class="icon">touch_app</span>
        <p>Arrastrá para posicionar la firma de <strong id="tip-name">—</strong></p>
      </div>

    </div>
  </main>

  <!-- COACHMARK -->
  <div class="coachmark" id="coachmark" onclick="cerrarCoach(event)">
    <div class="coach-card" onclick="event.stopPropagation()">
      <p class="coach-title">Ubicá las zonas de firma</p>
      <p class="coach-body">Cada firmante tendrá su propia zona en el documento. Arrastrá el recuadro para posicionarlo y estirá las esquinas para ajustar el tamaño.</p>
      <div class="coach-footer">
        <button class="btn-coach" onclick="cerrarCoach()">Entendido</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="btn-outline" onclick="window.history.back()"><span>Volver</span></button>
    <button class="btn-submit" id="btn-continuar" onclick="continuar()"><span>Continuar</span></button>
  </div>

</div>

<script>
  const COLORS = ['#2A39D0', '#0f766e', '#7c3aed', '#b45309', '#be123c', '#0369a1'];

  let firmantes = [];
  let zonas     = {};   // { idx: { x, y, w, h } }
  let activeIdx = 0;
  let zoom      = 1;

  // ── Init ──────────────────────────────────────
  function init() {
    const raw = sessionStorage.getItem('firmantes');
    firmantes = raw ? JSON.parse(raw) : [
      { email: 'isacris23@gmail.com', tieneCuenta: true },
      { email: 'pedro@empresa.com',   tieneCuenta: false },
    ];

    // Cargar PDF en iframe
    const blobUrl = sessionStorage.getItem('doc_blob_url');
    const frame   = document.getElementById('pdf-frame');
    const mock    = document.getElementById('doc-mock');

    if (blobUrl) {
      frame.src = blobUrl;
      mock.style.display = 'none';
    } else {
      frame.style.display = 'none';
      mock.style.display  = 'flex';
    }

    renderChips();
    setActive(0);
  }

  // ── Chips ──────────────────────────────────────
  function renderChips() {
    const bar = document.getElementById('signers-bar');
    bar.innerHTML = '<span class="bar-label">Firmante:</span>';
    firmantes.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'signer-chip' +
        (zonas[i] ? ' placed' : '') +
        (i === activeIdx ? ' active' : '');
      chip.id = 'chip-' + i;
      chip.onclick = () => setActive(i);
      chip.innerHTML = `
        <div class="chip-num" style="background:${COLORS[i % COLORS.length]}">${i + 1}</div>
        <span class="chip-email">${f.email}</span>
        <span class="icon chip-check">check_circle</span>
      `;
      bar.appendChild(chip);
    });
  }

  function setActive(idx) {
    activeIdx = idx;
    renderChips();
    actualizarTip();
    if (!zonas[idx]) crearZona(idx);
    renderZonas();
    actualizarBoton();
  }

  // ── Zonas ──────────────────────────────────────
  function crearZona(idx) {
    const card = document.getElementById('doc-card');
    // Posición inicial escalonada para no superponerse
    const startX = 20 + (idx % 2) * 130;
    const startY = Math.max(20, card.offsetHeight - 140 - idx * 60);
    zonas[idx] = { x: startX, y: startY, w: 130, h: 56 };
  }

  function renderZonas() {
    const overlay = document.getElementById('sig-overlay');
    overlay.innerHTML = '';

    Object.entries(zonas).forEach(([idxStr, pos]) => {
      const idx     = parseInt(idxStr);
      const f       = firmantes[idx];
      const color   = COLORS[idx % COLORS.length];
      const isActive = idx === activeIdx;

      const zone = document.createElement('div');
      zone.className = 'stamp-zone ' + (isActive ? '' : 'inactive-zone');
      zone.dataset.idx = idx;
      zone.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px;`;

      zone.innerHTML = `
        <div class="zone-label" style="background:${color}">
          <div class="zone-num">${idx + 1}</div>
          <span class="zone-email">${f.email.split('@')[0]}</span>
        </div>
        <div class="handle tl" data-corner="tl"></div>
        <div class="handle tr" data-corner="tr"></div>
        <div class="handle bl" data-corner="bl"></div>
        <div class="handle br" data-corner="br"></div>
      `;

      if (isActive) {
        makeDraggable(zone, idx);
        makeResizable(zone, idx);
        zone.addEventListener('pointerdown', e => {
          if (!e.target.dataset.corner) setActive(idx);
        });
      } else {
        zone.addEventListener('pointerdown', () => setActive(idx));
      }

      overlay.appendChild(zone);
    });
  }

  // ── Drag ──────────────────────────────────────
  function makeDraggable(el, idx) {
    let sx, sy, sl, st;

    function onStart(e) {
      if (e.target.dataset.corner) return;
      e.preventDefault();
      const pt = e.touches ? e.touches[0] : e;
      sx = pt.clientX; sy = pt.clientY;
      sl = zonas[idx].x; st = zonas[idx].y;
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onEnd);
    }

    function onMove(e) {
      const dx = e.clientX - sx;
      const dy = e.clientY - sy;
      const card = document.getElementById('doc-card');
      zonas[idx].x = Math.max(0, Math.min(card.offsetWidth  - zonas[idx].w, sl + dx));
      zonas[idx].y = Math.max(0, Math.min(card.offsetHeight - zonas[idx].h, st + dy));
      el.style.left = zonas[idx].x + 'px';
      el.style.top  = zonas[idx].y + 'px';
    }

    function onEnd() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onEnd);
    }

    el.addEventListener('pointerdown', onStart);
  }

  // ── Resize ────────────────────────────────────
  function makeResizable(el, idx) {
    el.querySelectorAll('.handle').forEach(h => {
      h.addEventListener('pointerdown', e => {
        e.preventDefault(); e.stopPropagation();
        const corner = h.dataset.corner;
        const sx = e.clientX, sy = e.clientY;
        const orig = { ...zonas[idx] };

        function onMove(ev) {
          const dx = ev.clientX - sx, dy = ev.clientY - sy;
          if (corner === 'br') {
            zonas[idx].w = Math.max(80, orig.w + dx);
            zonas[idx].h = Math.max(40, orig.h + dy);
          } else if (corner === 'bl') {
            const nw = Math.max(80, orig.w - dx);
            zonas[idx].x = orig.x + (orig.w - nw); zonas[idx].w = nw;
            zonas[idx].h = Math.max(40, orig.h + dy);
          } else if (corner === 'tr') {
            zonas[idx].w = Math.max(80, orig.w + dx);
            const nh = Math.max(40, orig.h - dy);
            zonas[idx].y = orig.y + (orig.h - nh); zonas[idx].h = nh;
          } else if (corner === 'tl') {
            const nw = Math.max(80, orig.w - dx);
            zonas[idx].x = orig.x + (orig.w - nw); zonas[idx].w = nw;
            const nh = Math.max(40, orig.h - dy);
            zonas[idx].y = orig.y + (orig.h - nh); zonas[idx].h = nh;
          }
          el.style.cssText = `left:${zonas[idx].x}px;top:${zonas[idx].y}px;width:${zonas[idx].w}px;height:${zonas[idx].h}px;`;
        }

        function onEnd() {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onEnd);
        }

        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onEnd);
      });
    });
  }

  // ── Zoom ──────────────────────────────────────
  function zoomIn()  { zoom = Math.min(2.0, zoom + 0.25); applyZoom(); }
  function zoomOut() { zoom = Math.max(0.5, zoom - 0.25); applyZoom(); }

  function applyZoom() {
    document.getElementById('doc-scaler').style.transform = `scale(${zoom})`;
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  }

  // ── Tip ───────────────────────────────────────
  function actualizarTip() {
    const f = firmantes[activeIdx];
    if (f) document.getElementById('tip-name').textContent = f.email.split('@')[0];
  }

  // ── Coachmark ─────────────────────────────────
  function cerrarCoach(e) {
    if (e && e.target !== document.getElementById('coachmark')) return;
    document.getElementById('coachmark').classList.add('hidden');
  }

  // ── Continuar ─────────────────────────────────
  function actualizarBoton() {
    const ok = firmantes.every((_, i) => zonas[i]);
    document.getElementById('btn-continuar').classList.toggle('active', ok);
  }

  function continuar() {
    if (!document.getElementById('btn-continuar').classList.contains('active')) return;
    sessionStorage.setItem('zonas_firma', JSON.stringify(zonas));
    window.location.href = 'confirmar-envio.html';
  }

  init();
</script>
</body>
</html>

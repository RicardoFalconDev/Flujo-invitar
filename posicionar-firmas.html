<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Posicionar firmas | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/header.css" />
  <link rel="stylesheet" href="assets/css/buttons.css" />

  <style>
    body, .page { background: #1a1a2e; overflow: hidden; }

    /* ── Layout principal ── */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
    }

    /* ── Barra de firmantes (top) ── */
    .signers-bar {
      background: #fff;
      border-bottom: 1px solid var(--border-hdr);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .signers-bar::-webkit-scrollbar { display: none; }

    .signer-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px 6px 8px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, background .15s;
      flex-shrink: 0;
    }

    .signer-chip.active {
      border-color: var(--blue);
      background: #f0f2ff;
    }

    .signer-chip.placed {
      border-color: #22c55e;
      background: #f0fdf4;
    }

    .chip-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      color: #fff;
      flex-shrink: 0;
    }

    .signer-chip.placed .chip-num { background: #16a34a; }

    .chip-email {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-main);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip-check {
      font-size: 14px;
      color: #16a34a;
      display: none;
    }

    .signer-chip.placed .chip-check { display: block; }

    .bar-label {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
      flex-shrink: 0;
      margin-right: 4px;
    }

    /* ── Área del documento ── */
    .doc-area {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 16px;
    }

    .doc-card {
      width: 295px;
      height: 416px;
      background: #fff;
      border: 0.5px solid #dee2e6;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      flex-shrink: 0;
    }

    /* Mock PDF content */
    .doc-mock {
      position: absolute;
      inset: 0;
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .doc-mock-line {
      height: 8px;
      border-radius: 2px;
      background: #e8e9f0;
    }

    .doc-mock-line.title { height: 14px; width: 60%; background: #d0d2df; }
    .doc-mock-line.short { width: 45%; }
    .doc-mock-line.medium { width: 75%; }
    .doc-mock-line.long { width: 92%; }

    .doc-mock-block {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Zonas de firma en el documento ── */
    .stamp-zone {
      position: absolute;
      border: 2px dashed var(--blue);
      border-radius: 3px;
      background: rgba(42,57,208,.08);
      cursor: move;
      touch-action: none;
      min-width: 90px;
      min-height: 50px;
      display: flex;
      flex-direction: column;
    }

    .stamp-zone.active-zone {
      border-color: var(--blue);
      background: rgba(42,57,208,.12);
      z-index: 20;
    }

    .stamp-zone.inactive-zone {
      border-color: #22c55e;
      background: rgba(34,197,94,.08);
      cursor: default;
    }

    .zone-label {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      background: var(--blue);
      border-radius: 2px 2px 0 0;
      flex-shrink: 0;
    }

    .stamp-zone.inactive-zone .zone-label { background: #16a34a; }

    .zone-num {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .zone-email {
      font-size: 9px;
      color: rgba(255,255,255,.9);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    /* Handles de resize */
    .handle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #fff;
      border: 2px solid var(--blue);
      border-radius: 2px;
      z-index: 5;
    }

    .stamp-zone.inactive-zone .handle { border-color: #16a34a; }

    .handle.tl { top: -5px; left: -5px; cursor: nwse-resize; }
    .handle.tr { top: -5px; right: -5px; cursor: nesw-resize; }
    .handle.bl { bottom: -5px; left: -5px; cursor: nesw-resize; }
    .handle.br { bottom: -5px; right: -5px; cursor: nwse-resize; }

    /* ── Tooltip de instrucción ── */
    .instruction-tip {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,26,46,.85);
      backdrop-filter: blur(4px);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      z-index: 30;
      transition: opacity .3s;
    }

    .instruction-tip.hidden { opacity: 0; pointer-events: none; }

    .instruction-tip .icon { color: #fff; font-size: 18px; }
    .instruction-tip p { font-size: 12px; color: rgba(255,255,255,.9); margin: 0; }

    /* ── Controls pill ── */
    .controls-pill {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,.95);
      border-radius: 999px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      z-index: 30;
    }

    .ctrl-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s;
    }

    .ctrl-btn:hover { background: var(--bg-sidebar); }
    .ctrl-btn .icon { font-size: 16px; color: var(--text-main); }

    .ctrl-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .ctrl-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      min-width: 30px;
      text-align: center;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      background: #fff;
      border-top: 1px solid var(--border-hdr);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .bottom-bar button { flex: 1; }

    /* ── Coachmark overlay ── */
    .coachmark {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: pointer;
    }

    .coachmark.hidden { display: none; }

    .coach-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: default;
    }

    .coach-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-dark);
    }

    .coach-body {
      font-size: 14px;
      line-height: 20px;
      color: var(--text-sub);
    }

    .coach-footer {
      display: flex;
      justify-content: flex-end;
    }

    .btn-coach {
      height: 36px;
      padding: 0 20px;
      background: var(--blue);
      border-radius: 20px;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn-coach:hover { opacity: .9; }
  </style>
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header class="header" style="background:#fff">
    <img class="header-logo" src="assets/icons/logo-fid.svg" alt="FID by Lakaut" />
    <span class="header-title">Ubicar firmas</span>
    <button class="icon-btn" aria-label="Cerrar" onclick="window.history.back()">
      <span class="icon">close</span>
    </button>
  </header>

  <!-- ── Barra de firmantes ── -->
  <div class="signers-bar" id="signers-bar">
    <span class="bar-label">Firmante:</span>
    <!-- chips poblados por JS -->
  </div>

  <!-- ── Área principal ── -->
  <main class="content-area">
    <div class="doc-area" id="doc-area">

      <!-- Controles de zoom y página -->
      <div class="controls-pill">
        <button class="ctrl-btn" onclick="zoomOut()" aria-label="Alejar">
          <span class="icon">remove</span>
        </button>
        <span class="ctrl-label" id="zoom-label">100%</span>
        <button class="ctrl-btn" onclick="zoomIn()" aria-label="Acercar">
          <span class="icon">add</span>
        </button>
        <div class="ctrl-divider"></div>
        <button class="ctrl-btn" onclick="prevPage()" aria-label="Página anterior">
          <span class="icon">chevron_left</span>
        </button>
        <span class="ctrl-label" id="page-label">1/2</span>
        <button class="ctrl-btn" onclick="nextPage()" aria-label="Página siguiente">
          <span class="icon">chevron_right</span>
        </button>
      </div>

      <!-- Documento mock -->
      <div class="doc-card" id="doc-card">
        <!-- Contenido mock del PDF -->
        <div class="doc-mock">
          <div class="doc-mock-line title"></div>
          <div class="doc-mock-block">
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line medium"></div>
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line short"></div>
          </div>
          <div class="doc-mock-block">
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line medium"></div>
          </div>
          <div class="doc-mock-block">
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line short"></div>
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line medium"></div>
          </div>
          <div class="doc-mock-block">
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line long"></div>
            <div class="doc-mock-line short"></div>
          </div>
          <div class="doc-mock-block">
            <div class="doc-mock-line medium"></div>
            <div class="doc-mock-line long"></div>
          </div>
        </div>
        <!-- Zonas de firma insertadas por JS -->
      </div>

      <!-- Tip de instrucción -->
      <div class="instruction-tip" id="instruction-tip">
        <span class="icon">touch_app</span>
        <p id="tip-text">Arrastrá para posicionar la firma de <strong id="tip-name">—</strong></p>
      </div>

    </div>
  </main>

  <!-- ── Coachmark inicial ── -->
  <div class="coachmark" id="coachmark" onclick="cerrarCoach(event)">
    <div class="coach-card" onclick="event.stopPropagation()">
      <p class="coach-title">Ubicá las zonas de firma</p>
      <p class="coach-body">Cada firmante tendrá una zona en el documento. Arrastrá el recuadro para posicionarlo y estirá las esquinas para cambiar su tamaño.</p>
      <div class="coach-footer">
        <button class="btn-coach" onclick="cerrarCoach()">Entendido</button>
      </div>
    </div>
  </div>

  <!-- ── Bottom bar ── -->
  <div class="bottom-bar">
    <button class="btn-outline" onclick="window.history.back()">
      <span>Volver</span>
    </button>
    <button class="btn-submit" id="btn-continuar" onclick="continuar()">
      <span>Continuar</span>
    </button>
  </div>

</div>

<script>
  const COLORS = ['#2A39D0', '#0f766e', '#7c3aed', '#b45309', '#be123c', '#0369a1'];

  let firmantes = [];
  let zonas = {};    // { idx: { x, y, w, h } }
  let activeIdx = 0;
  let zoom = 1;
  let currentPage = 1;
  const totalPages = 2;

  // ── Init ──
  function init() {
    const raw = sessionStorage.getItem('firmantes');
    firmantes = raw ? JSON.parse(raw) : [
      { email: 'isacris23@gmail.com', tieneCuenta: true },
      { email: 'pedro@empresa.com', tieneCuenta: false },
    ];

    renderChips();
    setActive(0);
  }

  function renderChips() {
    const bar = document.getElementById('signers-bar');
    // Limpiar excepto el label
    bar.innerHTML = '<span class="bar-label">Firmante:</span>';
    firmantes.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'signer-chip' + (zonas[i] ? ' placed' : '') + (i === activeIdx ? ' active' : '');
      chip.id = 'chip-' + i;
      chip.onclick = () => setActive(i);
      chip.innerHTML = `
        <div class="chip-num" style="background:${COLORS[i % COLORS.length]}">${i + 1}</div>
        <span class="chip-email">${f.email}</span>
        <span class="icon chip-check">check_circle</span>
      `;
      bar.appendChild(chip);
    });
  }

  function setActive(idx) {
    activeIdx = idx;
    renderChips();
    actualizarTip();
    actualizarBoton();

    // Si ya tiene zona, no crear nueva
    if (!zonas[idx]) {
      crearZona(idx);
    }
    // Resaltar zona activa
    document.querySelectorAll('.stamp-zone').forEach(z => {
      const zi = parseInt(z.dataset.idx);
      z.classList.toggle('active-zone', zi === idx);
      z.classList.toggle('inactive-zone', zi !== idx);
    });
  }

  function crearZona(idx) {
    const card = document.getElementById('doc-card');
    const cardRect = card.getBoundingClientRect();

    // Posición inicial escalonada
    const startX = 20 + (idx * 10);
    const startY = 280 - (idx * 60);

    zonas[idx] = { x: startX, y: Math.max(startY, 20), w: 120, h: 52 };
    renderZonas();
  }

  function renderZonas() {
    const card = document.getElementById('doc-card');
    // Remover zonas existentes
    card.querySelectorAll('.stamp-zone').forEach(z => z.remove());

    Object.entries(zonas).forEach(([idxStr, pos]) => {
      const idx = parseInt(idxStr);
      const f = firmantes[idx];
      const color = COLORS[idx % COLORS.length];
      const isActive = idx === activeIdx;

      const zone = document.createElement('div');
      zone.className = 'stamp-zone ' + (isActive ? 'active-zone' : 'inactive-zone');
      zone.dataset.idx = idx;
      zone.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px;`;

      zone.innerHTML = `
        <div class="zone-label" style="background:${color}">
          <div class="zone-num">${idx + 1}</div>
          <span class="zone-email">${f.email.split('@')[0]}</span>
        </div>
        <div class="handle tl" data-corner="tl"></div>
        <div class="handle tr" data-corner="tr"></div>
        <div class="handle bl" data-corner="bl"></div>
        <div class="handle br" data-corner="br"></div>
      `;

      if (isActive) {
        makeDraggable(zone, idx);
        makeResizable(zone, idx);
        zone.addEventListener('mousedown', e => { if (!e.target.dataset.corner) setActive(idx); });
        zone.addEventListener('touchstart', e => { if (!e.target.dataset.corner) setActive(idx); }, { passive: true });
      }

      card.appendChild(zone);
    });
  }

  // ── Drag ──
  function makeDraggable(el, idx) {
    let startX, startY, startLeft, startTop;

    function onStart(e) {
      if (e.target.dataset.corner) return;
      e.preventDefault();
      const pt = e.touches ? e.touches[0] : e;
      startX = pt.clientX;
      startY = pt.clientY;
      startLeft = zonas[idx].x;
      startTop = zonas[idx].y;

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
    }

    function onMove(e) {
      e.preventDefault();
      const pt = e.touches ? e.touches[0] : e;
      const dx = pt.clientX - startX;
      const dy = pt.clientY - startY;

      const card = document.getElementById('doc-card');
      const maxX = card.offsetWidth - zonas[idx].w;
      const maxY = card.offsetHeight - zonas[idx].h;

      zonas[idx].x = Math.max(0, Math.min(maxX, startLeft + dx));
      zonas[idx].y = Math.max(0, Math.min(maxY, startTop + dy));

      el.style.left = zonas[idx].x + 'px';
      el.style.top = zonas[idx].y + 'px';
    }

    function onEnd() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }

    el.addEventListener('mousedown', onStart);
    el.addEventListener('touchstart', onStart, { passive: false });
  }

  // ── Resize ──
  function makeResizable(el, idx) {
    el.querySelectorAll('.handle').forEach(handle => {
      handle.addEventListener('mousedown', e => startResize(e, handle.dataset.corner, idx, el));
      handle.addEventListener('touchstart', e => startResize(e, handle.dataset.corner, idx, el), { passive: false });
    });
  }

  function startResize(e, corner, idx, el) {
    e.preventDefault();
    e.stopPropagation();
    const pt = e.touches ? e.touches[0] : e;
    const startX = pt.clientX;
    const startY = pt.clientY;
    const orig = { ...zonas[idx] };

    function onMove(ev) {
      ev.preventDefault();
      const p = ev.touches ? ev.touches[0] : ev;
      const dx = p.clientX - startX;
      const dy = p.clientY - startY;
      const card = document.getElementById('doc-card');

      if (corner === 'br') {
        zonas[idx].w = Math.max(80, orig.w + dx);
        zonas[idx].h = Math.max(40, orig.h + dy);
      } else if (corner === 'bl') {
        const newW = Math.max(80, orig.w - dx);
        zonas[idx].x = orig.x + (orig.w - newW);
        zonas[idx].w = newW;
        zonas[idx].h = Math.max(40, orig.h + dy);
      } else if (corner === 'tr') {
        zonas[idx].w = Math.max(80, orig.w + dx);
        const newH = Math.max(40, orig.h - dy);
        zonas[idx].y = orig.y + (orig.h - newH);
        zonas[idx].h = newH;
      } else if (corner === 'tl') {
        const newW = Math.max(80, orig.w - dx);
        zonas[idx].x = orig.x + (orig.w - newW);
        zonas[idx].w = newW;
        const newH = Math.max(40, orig.h - dy);
        zonas[idx].y = orig.y + (orig.h - newH);
        zonas[idx].h = newH;
      }

      el.style.cssText = `left:${zonas[idx].x}px;top:${zonas[idx].y}px;width:${zonas[idx].w}px;height:${zonas[idx].h}px;`;
    }

    function onEnd() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }

  // ── Zoom ──
  function zoomIn() {
    zoom = Math.min(2, zoom + 0.25);
    applyZoom();
  }

  function zoomOut() {
    zoom = Math.max(0.5, zoom - 0.25);
    applyZoom();
  }

  function applyZoom() {
    document.getElementById('doc-card').style.transform = `scale(${zoom})`;
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  }

  // ── Páginas ──
  function prevPage() {
    if (currentPage <= 1) return;
    currentPage--;
    actualizarPagina();
  }

  function nextPage() {
    if (currentPage >= totalPages) return;
    currentPage++;
    actualizarPagina();
  }

  function actualizarPagina() {
    document.getElementById('page-label').textContent = `${currentPage}/${totalPages}`;
  }

  // ── Tip ──
  function actualizarTip() {
    const f = firmantes[activeIdx];
    if (f) {
      document.getElementById('tip-name').textContent = f.email.split('@')[0];
    }
  }

  // ── Coachmark ──
  function cerrarCoach(e) {
    if (e && e.target !== document.getElementById('coachmark')) return;
    document.getElementById('coachmark').classList.add('hidden');
  }

  // ── Botón continuar ──
  function actualizarBoton() {
    const todosColocados = firmantes.every((_, i) => zonas[i]);
    document.getElementById('btn-continuar').classList.toggle('active', todosColocados);
  }

  function continuar() {
    if (!document.getElementById('btn-continuar').classList.contains('active')) return;
    sessionStorage.setItem('zonas_firma', JSON.stringify(zonas));
    window.location.href = 'confirmar-envio.html';
  }

  init();
</script>
</body>
</html>
